<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新标签页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wallpaper" class="wallpaper" aria-hidden="true"></div>
  <div id="glass-top" class="glass glass-top" aria-hidden="true"></div>
  <div id="glass-bottom" class="glass glass-bottom" aria-hidden="true"></div>
  <div id="app">
    <div id="widget-time" class="widget widget-time" hidden></div>
    <div id="widget-weather" class="widget widget-weather" hidden></div>
    <form id="search-form" class="search-form">
      <input type="search" id="search-input" class="search-input" placeholder="在 Bing 上搜索..." autocomplete="off" enterkeyhint="search">
      <button type="submit" class="search-btn">搜索</button>
    </form>
    <div class="favorites">
      <button id="favorites-toggle" class="favorites-toggle" type="button" aria-expanded="false">
        <span class="favorites-title">收藏夹</span>
        <span class="favorites-arrow" aria-hidden="true">▼</span>
      </button>
      <div id="favorites-panel" class="favorites-panel" hidden>
        <div class="favorites-scroller" id="favorites-scroller"></div>
      </div>
    </div>
    <div class="placeholder" id="placeholder">MyEdgeStyle 新标签页</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
