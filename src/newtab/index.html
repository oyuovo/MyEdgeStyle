<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新标签页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wallpaper" class="wallpaper" aria-hidden="true"></div>
  <div id="glass-top" class="glass glass-top" aria-hidden="true"></div>
  <div id="glass-bottom" class="glass glass-bottom" aria-hidden="true"></div>
  <div id="app">
    <nav class="view-tabs" role="tablist">
      <button type="button" class="view-tab active" role="tab" id="tab-home" aria-selected="true">首页</button>
      <button type="button" class="view-tab" role="tab" id="tab-favorites" aria-selected="false">收藏导航</button>
    </nav>
    <div id="view-home" class="view-pane" role="tabpanel">
      <div id="widget-time" class="widget widget-time" hidden></div>
      <div id="widget-weather" class="widget widget-weather" hidden></div>
      <form id="search-form" class="search-form">
        <input type="search" id="search-input" class="search-input" placeholder="在 Bing 上搜索..." autocomplete="off" enterkeyhint="search">
        <button type="submit" class="search-btn">搜索</button>
      </form>
      <div class="placeholder" id="placeholder">MyEdgeStyle 新标签页</div>
    </div>
    <div id="view-favorites" class="view-pane hidden" role="tabpanel">
      <div class="favorites-nav">
        <input type="search" id="favorites-nav-search" class="favorites-nav-search" placeholder="搜索收藏（标题或网址）..." autocomplete="off">
        <div id="favorites-nav-content" class="favorites-nav-content"></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
